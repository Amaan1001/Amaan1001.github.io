<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amaan Farooque Shaikh</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --sand:#F5F0E8;
    --sand2:#EDE5D8;
    --sand3:#E0D5C4;
    --ink:#1A1410;
    --ink2:#2E261E;
    --muted:#6B5E4E;
    --faint:#9E8E7C;
    --border:rgba(26,20,16,0.09);
    --border2:rgba(26,20,16,0.17);
    --rust:#C44B2A;
    --rust-dim:rgba(196,75,42,0.1);
    --teal:#2A7A5A;
    --teal-dim:rgba(42,122,90,0.1);
    --gold:#B07A20;
    --gold-dim:rgba(176,122,32,0.1);
    --serif:'Instrument Serif',serif;
    --display:'Syne',sans-serif;
    --mono:'DM Mono',monospace;
  }
  html{scroll-behavior:smooth}
  body{font-family:var(--display);background:var(--sand);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;cursor:none}
  #root{min-height:100vh}

  /* CUSTOM CURSOR */
  .cursor{position:fixed;pointer-events:none;z-index:9999;mix-blend-mode:multiply}
  .cursor-dot{width:8px;height:8px;background:var(--rust);border-radius:50%;transform:translate(-50%,-50%);transition:transform 0.1s}
  .cursor-ring{width:36px;height:36px;border:1.5px solid var(--rust);border-radius:50%;transform:translate(-50%,-50%);transition:all 0.18s ease;opacity:0.5}
  .cursor-ring.hovered{transform:translate(-50%,-50%) scale(1.8);opacity:0.2;background:var(--rust)}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--sand)}
  ::-webkit-scrollbar-thumb{background:var(--faint);border-radius:3px}

  /* NAV */
  .nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 3rem;height:64px;background:rgba(245,240,232,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
  .nav-logo{font-family:var(--serif);font-size:22px;font-style:italic;color:var(--ink);text-decoration:none;letter-spacing:-0.01em}
  .nav-links{display:flex;gap:2rem;list-style:none}
  .nav-links a{font-size:12px;color:var(--muted);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;transition:color 0.2s}
  .nav-links a:hover{color:var(--rust)}
  .nav-badge{font-family:var(--mono);font-size:11px;color:var(--teal);background:var(--teal-dim);border:1px solid rgba(42,122,90,0.2);padding:6px 14px;border-radius:100px;letter-spacing:0.03em;display:flex;align-items:center;gap:6px}
  .nav-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal);animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

  /* HERO */
  .hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:64px;position:relative;overflow:hidden}
  .hero-left{display:flex;flex-direction:column;justify-content:center;padding:5rem 3rem 5rem 3rem;position:relative;z-index:2}
  .hero-right{position:relative;background:#B84B2A;border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;padding:4rem 3rem;overflow:hidden}

  /* MARQUEE */
  .marquee-wrap{overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:12px 0;margin:2.5rem 0;background:var(--sand2)}
  .marquee-inner{display:flex;gap:0;animation:marquee 20s linear infinite;white-space:nowrap}
  .marquee-inner span{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:0 2rem}
  .marquee-inner .dot{color:var(--rust)}
  @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* GRID BG */
  .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px);background-size:40px 40px;opacity:1;pointer-events:none}

  /* BLOB */
  .blob{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;opacity:0.5}

  /* ANIMATIONS */
  @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
  .anim-1{animation:fadeUp 0.8s ease 0.1s both}
  .anim-2{animation:fadeUp 0.8s ease 0.25s both}
  .anim-3{animation:fadeUp 0.8s ease 0.4s both}
  .anim-4{animation:fadeUp 0.8s ease 0.55s both}
  .anim-5{animation:fadeUp 0.8s ease 0.7s both}

  /* SECTION */
  section{padding:7rem 3rem;position:relative}
  .sec-header{margin-bottom:4rem}
  .sec-num{font-family:var(--mono);font-size:11px;color:var(--rust);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.8rem}
  h2.sec-title{font-family:var(--serif);font-size:clamp(2.4rem,4vw,3.2rem);font-weight:400;letter-spacing:-0.02em;line-height:1.15;color:var(--ink)}
  h2.sec-title em{font-style:italic;color:var(--rust)}
  .sec-sub{color:var(--muted);font-size:15px;max-width:480px;margin-top:1rem;line-height:1.7;font-weight:400}

  /* ABOUT */
  .about-wrap{background:var(--sand2)}
  .about-grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:5rem;max-width:1100px;margin:0 auto;padding:7rem 3rem}
  .about-body p{color:var(--muted);font-size:15.5px;line-height:1.8;margin-bottom:1.4rem;font-weight:400}
  .about-body p strong{color:var(--ink);font-weight:600}
  .about-stack{display:flex;flex-direction:column;gap:1rem}
  .about-tile{background:var(--sand);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;border-left:3px solid var(--rust);transition:transform 0.2s}
  .about-tile:hover{transform:translateX(4px)}
  .atile-label{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
  .atile-val{font-size:14px;font-weight:600;color:var(--ink)}
  .atile-sub{font-size:13px;color:var(--muted);margin-top:2px}

  /* SKILLS */
  .skills-wrap{max-width:1100px;margin:0 auto}
  .skills-tabs{display:flex;gap:8px;margin-bottom:2.5rem;flex-wrap:wrap}
  .skill-tab{font-family:var(--display);font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:8px 18px;border-radius:100px;border:1.5px solid var(--border2);background:transparent;color:var(--muted);cursor:none;transition:all 0.2s}
  .skill-tab.active{background:var(--ink);color:var(--sand);border-color:var(--ink)}
  .skill-tab:hover:not(.active){border-color:var(--rust);color:var(--rust)}
  .skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
  .skill-chip{padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--sand);font-size:13px;font-weight:500;color:var(--ink2);text-align:center;transition:all 0.2s;cursor:none;font-family:var(--mono)}
  .skill-chip:hover{background:var(--sand3);border-color:var(--rust);color:var(--rust);transform:translateY(-2px)}
  .skill-chip.rust{border-left:3px solid var(--rust)}
  .skill-chip.teal{border-left:3px solid var(--teal)}
  .skill-chip.gold{border-left:3px solid var(--gold)}

  /* PROJECTS */
  .projects-wrap{background:var(--sand2)}
  .projects-inner{max-width:1100px;margin:0 auto;padding:7rem 3rem}
  .proj-featured{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border2);border-radius:20px;overflow:hidden;margin-bottom:1.5rem;background:var(--sand);position:relative}
  .proj-featured-left{padding:2.5rem;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:1.2rem}
  .proj-featured-right{padding:2.5rem;background:#B84B2A;display:flex;flex-direction:column;gap:1rem}
  .proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
  .proj-card{background:var(--sand);border:1px solid var(--border);border-radius:16px;padding:1.8rem;display:flex;flex-direction:column;gap:1rem;transition:all 0.3s;position:relative;overflow:hidden}
  .proj-card:hover{transform:translateY(-4px);border-color:var(--border2);box-shadow:0 12px 40px rgba(26,24,20,0.1)}
  .proj-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--rust),var(--teal));transform:scaleX(0);transform-origin:left;transition:transform 0.3s}
  .proj-card:hover::after{transform:scaleX(1)}
  .proj-accent{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:0.3rem}
  .proj-accent.rust{background:var(--rust-dim);border:1px solid rgba(196,75,42,0.25)}
  .proj-accent.teal{background:var(--teal-dim);border:1px solid rgba(42,122,90,0.25)}
  .proj-accent.gold{background:var(--gold-dim);border:1px solid rgba(176,122,32,0.25)}
  .proj-name{font-family:var(--serif);font-size:1.3rem;font-style:italic;color:var(--ink)}
  .proj-name-dark{font-family:var(--serif);font-size:1.5rem;font-style:italic;color:var(--sand)}
  .proj-sub{font-size:12px;color:var(--faint);font-family:var(--mono);letter-spacing:0.05em;text-transform:uppercase}
  .proj-sub-dark{font-size:12px;color:rgba(245,240,232,0.4);font-family:var(--mono);letter-spacing:0.05em;text-transform:uppercase}
  .proj-desc{font-size:13.5px;color:var(--muted);line-height:1.7;font-weight:400}
  .proj-desc-dark{font-size:13.5px;color:rgba(245,240,232,0.65);line-height:1.7}
  .proj-metrics-dark{display:flex;gap:2rem;padding:1.2rem;background:rgba(255,255,255,0.04);border-radius:10px;border:1px solid rgba(255,255,255,0.08)}
  .met-d{display:flex;flex-direction:column}
  .met-dv{font-family:var(--serif);font-size:1.8rem;font-style:italic;color:var(--sand);letter-spacing:-0.02em}
  .met-dl{font-size:10px;color:rgba(245,240,232,0.4);font-family:var(--mono);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px}
  .proj-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:auto}
  .pchip{font-family:var(--mono);font-size:10.5px;padding:3px 9px;border-radius:5px;background:var(--sand2);color:var(--muted);border:1px solid var(--border)}
  .pchip-dark{font-family:var(--mono);font-size:10.5px;padding:3px 9px;border-radius:5px;background:rgba(255,255,255,0.06);color:rgba(245,240,232,0.5);border:1px solid rgba(255,255,255,0.1)}
  .proj-link{font-size:13px;font-weight:600;color:var(--rust);text-decoration:none;letter-spacing:0.03em;display:inline-flex;align-items:center;gap:5px;margin-top:auto;transition:gap 0.2s}
  .proj-link:hover{gap:10px}
  .proj-link-light{font-size:13px;font-weight:600;color:rgba(245,240,232,0.7);text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:color 0.2s,gap 0.2s}
  .proj-link-light:hover{color:var(--sand);gap:10px}
  .feat-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--rust);border:1px solid rgba(196,82,26,0.3);background:var(--rust-dim);padding:4px 12px;border-radius:100px;width:fit-content}

  /* EXPERIENCE */
  .exp-wrap{max-width:1100px;margin:0 auto}
  .exp-item{display:grid;grid-template-columns:220px 1fr;gap:3rem;padding:3rem 0;border-bottom:1px solid var(--border);align-items:start}
  .exp-item:last-child{border-bottom:none}
  .exp-period{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:0.05em;margin-bottom:0.8rem}
  .exp-company{font-family:var(--serif);font-size:1.3rem;font-style:italic;color:var(--ink);margin-bottom:0.5rem}
  .exp-badge{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:3px 10px;border-radius:4px;display:inline-block}
  .exp-badge.b1{background:var(--rust-dim);color:var(--rust);border:1px solid rgba(196,75,42,0.25)}
  .exp-badge.b2{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(42,122,90,0.25)}
  .exp-badge.b3{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(176,122,32,0.25)}
  .exp-role{font-family:var(--display);font-size:1.05rem;font-weight:700;color:var(--ink);margin-bottom:1rem;letter-spacing:-0.01em}
  .exp-list{list-style:none;display:flex;flex-direction:column;gap:0.7rem}
  .exp-list li{font-size:14px;color:var(--muted);line-height:1.7;padding-left:1.3rem;position:relative}
  .exp-list li::before{content:'→';position:absolute;left:0;color:var(--rust);font-size:11px;top:4px}

  /* EDUCATION */
  .edu-wrap{background:var(--sand2)}
  .edu-inner{max-width:1100px;margin:0 auto;padding:7rem 3rem}
  .edu-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
  .edu-card{background:var(--sand);border:1px solid var(--border);border-radius:16px;padding:2rem;position:relative;overflow:hidden;transition:all 0.3s}
  .edu-card:hover{transform:translateY(-4px);border-color:var(--border2)}
  .edu-stripe{position:absolute;top:0;left:0;right:0;height:4px}
  .edu-stripe.rust{background:linear-gradient(90deg,var(--rust),var(--gold))}
  .edu-stripe.teal{background:linear-gradient(90deg,var(--teal),var(--rust))}
  .edu-school{font-family:var(--serif);font-size:1.25rem;font-style:italic;margin-top:0.8rem;margin-bottom:0.3rem;color:var(--ink)}
  .edu-deg{font-size:14px;color:var(--muted);margin-bottom:1rem;font-weight:400}
  .edu-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
  .edu-pill{font-family:var(--mono);font-size:11px;padding:4px 12px;border-radius:100px;background:var(--rust-dim);color:var(--rust);border:1px solid rgba(196,75,42,0.2)}
  .edu-courses{font-size:12px;color:var(--faint);font-family:var(--mono);line-height:1.8}

  /* CONTACT */
  .contact-wrap{max-width:900px;margin:0 auto;text-align:center;padding:8rem 3rem}
  .contact-title{font-family:var(--serif);font-size:clamp(3rem,6vw,5rem);font-style:italic;letter-spacing:-0.03em;line-height:1.1;margin-bottom:1.5rem;color:var(--ink)}
  .contact-title em{color:var(--rust);font-style:italic}
  .contact-sub{color:var(--muted);max-width:440px;margin:0 auto 3rem;font-size:16px;line-height:1.7}
  .contact-grid{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
  .clink{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink);text-decoration:none;border:1.5px solid var(--border2);padding:12px 24px;border-radius:100px;transition:all 0.25s;background:var(--sand)}
  .clink:hover{background:var(--ink);color:var(--sand);border-color:var(--ink);transform:translateY(-2px)}
  .clink svg{width:15px;height:15px}

  /* FOOTER */
  footer{border-top:1px solid var(--border);padding:2rem 3rem;display:flex;justify-content:space-between;font-size:12px;color:var(--faint);font-family:var(--mono);letter-spacing:0.05em}

  /* REVEAL */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity 0.75s ease,transform 0.75s ease}
  .reveal.in{opacity:1;transform:none}
  .reveal-l{opacity:0;transform:translateX(-28px);transition:opacity 0.75s ease,transform 0.75s ease}
  .reveal-l.in{opacity:1;transform:none}

  /* BIG STAT */
  .big-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:3rem}
  .big-stat{padding:1.8rem 1.5rem;border-right:1px solid var(--border);text-align:center;background:var(--sand);transition:background 0.2s}
  .big-stat:last-child{border-right:none}
  .big-stat:hover{background:var(--sand2)}
  .bs-num{font-family:var(--serif);font-size:2.4rem;font-style:italic;color:var(--rust);display:block;letter-spacing:-0.02em}
  .bs-label{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px;display:block}

  /* TYPING */
  .typing{display:inline-block;font-family:var(--mono);font-size:13px;color:var(--teal);background:var(--teal-dim);border:1px solid rgba(27,107,90,0.15);padding:4px 14px;border-radius:6px;position:relative}
  .typing::after{content:'|';animation:blink 1s infinite;margin-left:1px;color:var(--teal)}

  /* PROGRESS RING */
  .ring-wrap{position:relative;width:80px;height:80px}
  .ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ink)}

  @media(max-width:900px){
    .hero{grid-template-columns:1fr}
    .hero-right{display:none}
    .about-grid{grid-template-columns:1fr;padding:5rem 1.5rem}
    .proj-featured{grid-template-columns:1fr}
    .proj-featured-right{border-left:none;border-top:1px solid var(--border)}
    .proj-grid{grid-template-columns:1fr}
    .exp-item{grid-template-columns:1fr;gap:1rem}
    .edu-grid{grid-template-columns:1fr}
    .big-stat-row{grid-template-columns:repeat(2,1fr)}
    .big-stat:nth-child(2){border-right:none}
    section{padding:5rem 1.5rem}
    .nav{padding:0 1.5rem}
    .nav-links{display:none}
    footer{padding:2rem 1.5rem}
  }
</style>
</head>
<body>
<div id="root"></div>
